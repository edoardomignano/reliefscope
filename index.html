<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F5F5F2" />
    <title>ReliefScope</title>
  </head>
  <body>
    <div id="app">
      <aside id="panel" aria-label="Werkzeuge">
        <header id="brand">ReliefScope</header>
        <div id="panel-content">
          <section data-tab="karte" aria-labelledby="h-karte">
            <h2 id="h-karte">Karte</h2>
            <p class="placeholder">Kartenebenen &amp; Ansichten folgen in Phase 1.</p>
          </section>
          <section data-tab="check" aria-labelledby="h-check">
            <h2 id="h-check">Prüfen</h2>
            <p class="placeholder">Ort-Check (Ampel + Historie) folgt in Phase 2.</p>
          </section>
          <section data-tab="funde" aria-labelledby="h-funde">
            <h2 id="h-funde">Funde</h2>
            <p class="placeholder">Fund-Logbuch folgt in Phase 4.</p>
          </section>
          <section data-tab="mehr" aria-labelledby="h-mehr">
            <h2 id="h-mehr">Mehr</h2>
            <p class="placeholder">Einstellungen, Hilfe &amp; Rechtliches folgen.</p>
          </section>
        </div>
        <nav id="tabs" aria-label="Bereiche">
          <button data-tabbtn="karte" class="on" type="button">🗺<span>Karte</span></button>
          <button data-tabbtn="check" type="button">🎯<span>Prüfen</span></button>
          <button data-tabbtn="funde" type="button">📦<span>Funde</span></button>
          <button data-tabbtn="mehr" type="button">⋯<span>Mehr</span></button>
        </nav>
      </aside>
      <main id="map" aria-label="Karte"></main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
