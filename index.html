<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F5F5F2" />
    <title>ReliefScope</title>
  </head>
  <body>
    <div id="app">
      <aside id="panel" aria-label="Werkzeuge">
        <header id="brand">ReliefScope</header>
        <div id="panel-content">
          <section data-tab="karte" aria-labelledby="h-karte">
            <h2 id="h-karte">Ansicht</h2>
            <div id="presets" role="group" aria-label="Ansichts-Presets"></div>
            <div id="layers"></div>
          </section>
          <section data-tab="check" aria-labelledby="h-check">
            <h2 id="h-check">Ort prüfen</h2>
            <button type="button" id="ortcheck-tool" class="tool-btn">
              🎯 Ort antippen &amp; prüfen
            </button>
            <label class="slider-row">
              <span>Umkreis: <b id="hist-val">500</b> m</span>
              <input type="range" id="hist-radius" min="100" max="2000" step="50" value="500" />
            </label>
            <div id="check-result"></div>
          </section>
          <section data-tab="funde" aria-labelledby="h-funde">
            <h2 id="h-funde">Feld &amp; Funde</h2>
            <div id="field-controls">
              <h3>Spur</h3>
              <p id="track-info" class="muted">Läuft GPS, wird deine Spur automatisch aufgezeichnet.</p>
              <button type="button" id="track-clear" class="btn-secondary">Spur löschen</button>

              <h3>Suchzone</h3>
              <p id="zone-info" class="muted">keine Zone</p>
              <div class="row2">
                <button type="button" id="zone-draw" class="btn-secondary">Zone zeichnen</button>
                <button type="button" id="zone-clear" class="btn-secondary">Zone löschen</button>
              </div>
              <label class="check-row">
                <input type="checkbox" id="zone-alarm" />
                Alarm, wenn ich die Zone verlasse (Vibration + Ton)
              </label>
            </div>
            <div id="finds-list"><p class="placeholder">Fund-Logbuch folgt in Phase 4.</p></div>
          </section>
          <section data-tab="mehr" aria-labelledby="h-mehr">
            <h2 id="h-mehr">Mehr</h2>
            <div id="mehr-content"></div>
          </section>
        </div>
        <nav id="tabs" aria-label="Bereiche">
          <button data-tabbtn="karte" class="on" type="button">🗺<span>Karte</span></button>
          <button data-tabbtn="check" type="button">🎯<span>Prüfen</span></button>
          <button data-tabbtn="funde" type="button">📦<span>Funde</span></button>
          <button data-tabbtn="mehr" type="button">⋯<span>Mehr</span></button>
        </nav>
      </aside>
      <main id="map" aria-label="Karte">
        <div id="hud" role="status">
          <span class="hud-chip">⏱ <b id="hud-time">0:00</b></span>
          <span class="hud-chip">🥾 <b id="hud-dist">0 m</b></span>
          <span class="hud-chip">± <b id="hud-acc">–</b></span>
        </div>
        <div id="zonectl">
          <span>Zone: für jeden Eckpunkt tippen</span>
          <button type="button" id="zone-done">Fertig</button>
          <button type="button" id="zone-cancel">Abbrechen</button>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
